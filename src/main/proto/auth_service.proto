syntax = "proto3";
package auth;

option java_multiple_files = true;
option java_package = "com.nemo.auth.grpc";

import "google/protobuf/empty.proto";

service ClientRegistrationService {
  rpc Register (ClientRegisterRequest) returns (ClientAuthResponse);
}
service EmployeeRegistrationService {
  rpc Register (EmployeeRegisterRequest) returns (EmployeeAuthResponse); // Поправлена опечатка
}

service ClientLoginService {
  rpc Login (ClientLoginRequest) returns (ClientAuthResponse);
  rpc Refresh (ClientRefreshRequest) returns (ClientAuthResponse);
  rpc Logout (ClientLogoutRequest) returns (google.protobuf.Empty);
}
service EmployeeLoginService {
  rpc Login (EmployeeLoginRequest) returns (EmployeeAuthResponse);
  rpc Refresh (EmployeeRefreshRequest) returns (EmployeeAuthResponse);
  rpc Logout (EmployeeLogoutRequest) returns (google.protobuf.Empty);
}

message ClientRegisterRequest {
  string username = 1;
  string email = 2;
  string phone = 3;
  string password = 4;
  string date_of_birth = 5;
}

message EmployeeRegisterRequest {
  string username = 1;
  string email = 2;
  string phone = 3;
  string password = 4;
  string date_of_birth = 5;
}

message ClientLoginRequest {
  string identifier = 1;
  string password = 2;
}

message EmployeeLoginRequest {
  string identifier = 1;
  string password = 2;
}

message ClientRefreshRequest {
  string refresh_token = 1;
}

message EmployeeRefreshRequest {
  string refresh_token = 1;
}

message ClientLogoutRequest {
  string refresh_token = 1;
}

message EmployeeLogoutRequest {
  string refresh_token = 1;
}

message ClientAuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
  repeated string contacts = 4;
}

message EmployeeAuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  string user_id = 3;
  repeated string contacts = 4;
}